<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>

    <style>

        *{
            margin: 0px;
        }

        body{
            width: 100%;
            height: 100vh;
            background-image: linear-gradient(180deg, #6A63A4, #1F1F35);
        }

        .view{
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .bg-left{
            position: absolute;
            bottom: 0px;
            left: 0px;
            width: 35%;
        }

        .bg-right{
            position: absolute;
            top: 0px;
            right: 0px;
            width: 32%;
            min-width: 30%;
        }

    </style>


</head>
    

<body>
    
    <div class="view">
        <img src="./index-img/Frame 1.svg" alt=""  class="bg-left">
        <img src="./index-img/Group 1.svg" alt=""  class="bg-right">
    </div>



</body>


</html>
