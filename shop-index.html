<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carousel index</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <!-- font awesome -->
    <link href="./fontawesome-(free-6.1.1-web)/css/all.css" rel="stylesheet">

    <style>

        .slider-dots>li{
        width: 8px;
        height: 8px;
        border-radius: 50%;
        /* outline: 1px solid #ff0000; */
        background: rgb(209, 209, 209);
        margin: auto 10px;
        }

        .slider-dots>li:hover{
            cursor: pointer;
        }

        .clothimg{
            height: 100%;
            /* padding: auto 0px !important; */
            padding: 0px;
            /* outline: 5px solid green; */
        }

        .train li{
            height: 100%;
            /* width:1100px; */
            padding: auto 10px;
            
        }

        .train img{
            object-fit: contain;
            height: 100%;
        }

        ul{
            padding: 0px;
            margin: 0px;
        }

        .train{
            /* transform: translateX(200px); */
            /* transform: translateX(-952px);  */
            transform: translateX(-2104px); 
            /* // 每次移動-1152px  第一次位置是在-2104px */

        }

        
        .carousel{
            position: relative;
        }
        
        .arrow-left{
            width: 60px;
            height: 100%;
            /* background-color: rgb(230, 20, 20); */
            /* outline: 1px solid gray; */
            position: absolute;
            top: 0px ;
            left: 200px;
            z-index: 5;
            /* top:50% */
        }
        .arrow-right{
            width: 60px;
            height: 100%;
            /* background-color: rgb(230, 20, 20); */
            /* outline: 1px solid gray; */
            position: absolute;
            top: 0px ;
            right: 175px;
            z-index: 5;
            /* top:50% */
        }
        
        .arrow-left>span{
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.715);
            outline: 1px solid gray;
            font-size: 18px;
            color:gray;
        }
        .arrow-right>span{
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.715);
            outline: 1px solid gray;
            font-size: 18px;
            color:gray;
        }

        .arrow-left>span:hover, .arrow-right>span:hover {
            cursor: pointer;
        }
    </style>

</head>

<body>

<div class=" mx-0 mt-5 carousel" >

    <!-- arrow -->
    <div class="arrow-left d-flex align-items-center">
        <span class="d-flex justify-content-center align-items-center"><i class="fa-solid fa-chevron-left"></i></span>
    </div>

    <!-- 圖文放這邊 -->

    <!-- wrap是要overflow hidden的人 -->
    <div class="wrap w-100 " style="overflow: hidden;">

        <!-- train是要調位置的人 每加一張圖加75%-->
        <ul class="train d-flex " style="height: 70vh; width:600%;">

            <!-- 假圖: 3 -->
            <div class="col  h-100 clothimg">
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220609_01.jpg" alt="" >
                </li>
            </div>


            <!-- 假圖: 4 -->
            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220526_01.jpg" alt="" >
                </li>
            </div>


            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220603_01.jpg" alt="" >
                </li>
            </div>
            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220616_01.jpg" alt="" >
                </li>
            </div>
            <div class="col  h-100 clothimg">
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220609_01.jpg" alt="" >
                </li>
            </div>
            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220526_01.jpg" alt="" >
                </li>
            </div>

            <!-- 假圖: 1 -->
            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220603_01.jpg" alt="" >
                </li>
            </div>

            <!-- 假圖: 2 -->
            <div class="col  h-100 clothimg" >
                <li class="list-unstyled text-center " >
                    <img src="./shop2/goods_220616_01.jpg" alt="" >
                </li>
            </div>

        </ul>


        <!-- 滑動小點 -->
        <ul class="slider-dots d-flex mt-5 justify-content-center align-items-center">
            <li class="list-unstyled "></li>
            <li class="list-unstyled"></li>
            <li class="list-unstyled"></li>
            <li class="list-unstyled"></li>
        </ul>
    </div>

    <div class="arrow-right d-flex align-items-center">
        <span class="d-flex justify-content-center align-items-center"><i class="fa-solid fa-angle-right"></i></span>
    </div>

</div>

<script src="./js/jquery-3.6.0.min.js"></script>

<script>

    
    let nowPage = 0 ; //預設什麼都沒按起始位置在[0]

    $('.slider-dots li').eq(0) //預設圓點[0]為深灰色
        .css("background", "gray")
        .siblings()
        .css("background", "rgb(209, 209, 209)");


    // 點按哪個圓形就移動照片 + 變色
    $(".slider-dots li").click(function () {
        console.log(nowPage);
        nowPage = $(this).index() ;
        trainmove();
    });

    // 往後箭頭
    $('.arrow-right').click(function(){
        nowPage++;
        console.log(nowPage);
        trainmove();
    })

    // 往前箭頭
    $('.arrow-left').click(function(){
        nowPage--;
        trainmove();
    })



    // 火車移動公式
    function trainmove(){
        // 每次移動1152  第一次位置是在952
            const moveX = -2104 + (nowPage) * -1152 + "px";
            $("ul.train").css('transition','.5s ease').css("transform", `translateX(${moveX})`);
            $('.slider-dots li')
                .eq(nowPage)
                .css("background", "gray")
                .siblings()
                .css("background", "rgb(209, 209, 209)");
        }


    function trainmoveWithout(){
        const moveX = -2104 + (nowPage) * -1152  + "px";
        $("ul.train").css("transition", "none").css("transform", `translateX(${moveX})`);
    
        // nowPage = 0;
        $('.slider-dots li')
            .eq(nowPage)
            .css("background", "gray")
            .siblings()
            .css("background", "rgb(209, 209, 209)");
    }

    // 事件監聽器
    $("ul.train").on("transitionend", function(){
            console.log('transition end',nowPage);
            if(nowPage>=4){
                nowPage = 0;
                trainmoveWithout();
            }

            if(nowPage<= -1){
                nowPage = 3;
                trainmoveWithout();
            }
        })

</script>

</body>
</html>
