<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mouse_drag</title>
    
        <link rel="stylesheet" href="./fontawesome-free-6.1.1-web/css/all.min.css">
    
        <style>
            .pointer{
                font-size: 45px;
                position: absolute;
            }

            html{
                width: 100%;
                height: 100%;
                outline:1px solid red;
                cursor:none;
            }
        </style>

    </head>

    <body >

        <!-- 滑鼠拖拉icon -->

        <div class="pointer" style="width:50px;">  
            <i class="fa-solid fa-hand"></i>   
        </div>


        <script src="./JS/jquery-3.6.0.min.js"></script>

        <script>

        // e.clientX e.clientY 可以取得function執行時的滑鼠位置
        // 設定一個function，並且直接呼叫(立即執行)

        $(window).css('cursor','pointer');

            $(window).mousemove(function(e){
                // const k = '<i class="fa-solid fa-hand"></i>  ';
                // $('.pointer').append(k);
                // console.log(e.clientX);
                // console.log(e.clientY);

                const x = (e.clientX)-25; //要扣掉50%圖片寬度
                const y = (e.clientY)-25; //要扣掉50%圖片高度
                $('.pointer').css('left',x).css('top',y);

            }).mousemove();


            // 滑鼠按下時，圖片換成drag
            $(window).mousedown(function(e){
                $('.fa-hand').remove();
                const k = '<i class="fa-solid fa-hand-back-fist"></i>';
                $('.pointer').append(k);
            });

            // 滑鼠放開時，圖片換成normal
            $(window).mouseup(function(e){
                $('.fa-solid').remove();
                const k = '<i class="fa-solid fa-hand"></i>  ';
                $('.pointer').append(k);
            });

            // console.log(event.clientX);


        </script>


    </body>
</html>
